<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ひらめの疾患図鑑｜たとえ話でわかる看護</title>
<meta name="description" content="看護師の「難しい…」を「なるほど！」へ。疾患・検査・薬をたとえ話と図解でやさしく解説する、ナースのための疾患図鑑。" />
<meta property="og:type" content="website" />
<meta property="og:title" content="ひらめの疾患図鑑｜たとえ話でわかる看護" />
<meta property="og:description" content="疾患・検査・薬をたとえ話と図解でやさしく解説。新人ナースもベテランも役立つ疾患図鑑。" />
<meta property="og:image" content="images/hf1-1.jpg" />
<meta property="og:url" content="https://hirame-lp-zeta.vercel.app/zukan/" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ctext%20y='.9em'%20font-size='88'%3E%F0%9F%A9%BA%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F5F7F4; --surface:#FFFFFF; --surface-2:#EDF1EC;
    --ink:#1C2620; --ink-soft:#586159; --ink-faint:#8A938B;
    --line:#E4E9E2;
    --brand:#2E7D64; --brand-deep:#1F6350; --brand-soft:#DCEDE5;
    --accent:#EE6C4D; --accent-soft:#FCE6DF; --warn:#C4553A;
    --shadow:0 10px 30px -14px rgba(30,50,40,.28);
    --shadow-lift:0 18px 44px -18px rgba(30,50,40,.40);
    --radius:20px;
    --font-body:'Zen Kaku Gothic New',system-ui,-apple-system,"Hiragino Sans","Yu Gothic UI","Noto Sans JP",sans-serif;
    --font-round:'Zen Maru Gothic',ui-rounded,"Hiragino Maru Gothic ProN",system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#101512; --surface:#182019; --surface-2:#1F2A23;
      --ink:#EAF0EA; --ink-soft:#A6B0A7; --ink-faint:#6E786F;
      --line:#26332B;
      --brand:#4FB392; --brand-deep:#66C6A5; --brand-soft:#12362B;
      --accent:#FF876A; --accent-soft:#3A2119; --warn:#FF9B7E;
      --shadow:0 12px 32px -16px rgba(0,0,0,.6);
      --shadow-lift:0 20px 50px -20px rgba(0,0,0,.7);
    }
  }
  :root[data-theme="light"]{
    --bg:#F5F7F4;--surface:#FFFFFF;--surface-2:#EDF1EC;--ink:#1C2620;--ink-soft:#586159;
    --ink-faint:#8A938B;--line:#E4E9E2;--brand:#2E7D64;--brand-deep:#1F6350;--brand-soft:#DCEDE5;
    --accent:#EE6C4D;--accent-soft:#FCE6DF;--warn:#C4553A;
    --shadow:0 10px 30px -14px rgba(30,50,40,.28);--shadow-lift:0 18px 44px -18px rgba(30,50,40,.40);
  }
  :root[data-theme="dark"]{
    --bg:#101512;--surface:#182019;--surface-2:#1F2A23;--ink:#EAF0EA;--ink-soft:#A6B0A7;
    --ink-faint:#6E786F;--line:#26332B;--brand:#4FB392;--brand-deep:#66C6A5;--brand-soft:#12362B;
    --accent:#FF876A;--accent-soft:#3A2119;--warn:#FF9B7E;
    --shadow:0 12px 32px -16px rgba(0,0,0,.6);--shadow-lift:0 20px 50px -20px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.7}
  .rounded{font-family:var(--font-round)}
  .wrap{max-width:760px;margin:0 auto;padding:22px 18px 60px}

  header{display:flex;flex-direction:column;gap:14px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{width:60px;height:60px;border-radius:18px;flex:none;object-fit:cover;box-shadow:var(--shadow);border:2px solid var(--surface);background:var(--brand-soft)}
  .brand h1{font-size:23px;font-weight:900;line-height:1.25;font-family:var(--font-round)}
  .brand h1 b{color:var(--accent)}
  .brand .sub{font-size:12.5px;color:var(--ink-soft);font-weight:500;margin-top:3px}
  .tagbio{background:var(--brand-soft);border-radius:14px;padding:11px 14px;font-size:12.5px;color:var(--brand-deep);font-weight:700;line-height:1.6}

  .search{position:relative}
  .search input{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px 13px 44px;outline:none;transition:border-color .18s,box-shadow .18s}
  .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .search .ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.7}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 4px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink-soft);transition:all .16s}
  .chip:hover{border-color:var(--brand)}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  .chip:focus-visible,.card:focus-visible,.vclose:focus-visible,.vbtn:focus-visible,.threads:focus-visible{outline:3px solid var(--accent);outline-offset:2px}

  .count{font-size:12px;color:var(--ink-faint);font-weight:600;margin:2px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{text-align:left;font-family:inherit;cursor:pointer;padding:0;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .14s,box-shadow .2s,border-color .2s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:color-mix(in srgb,var(--brand) 45%,var(--line))}
  .card:active{transform:translateY(0)}
  .thumb{position:relative;aspect-ratio:1/1;background:var(--brand-soft);overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:8px;right:8px;background:rgba(28,38,32,.82);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;display:flex;align-items:center;gap:4px}
  .cbody{padding:11px 13px 13px}
  .cbody .cat{display:inline-block;font-size:10px;font-weight:800;color:var(--brand-deep);background:var(--brand-soft);padding:2px 8px;border-radius:6px;margin-bottom:5px}
  .cbody .title{font-size:15px;font-weight:700;line-height:1.3;font-family:var(--font-round)}
  .cbody .tagline{font-size:12px;color:var(--accent);font-weight:700;margin-top:3px}
  .cbody .tagline::before{content:"“"}
  .cbody .tagline::after{content:"”"}

  footer{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
  .threads{display:inline-flex;align-items:center;gap:9px;font-family:inherit;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;color:#fff;background:var(--ink);border:none;padding:13px 22px;border-radius:14px;transition:transform .12s,filter .2s}
  .threads:hover{filter:brightness(1.12)}
  .threads:active{transform:scale(.98)}
  .backlp{font-size:12.5px;color:var(--brand-deep);font-weight:700;text-decoration:none}
  .backlp:hover{text-decoration:underline}
  .disc{font-size:11.5px;color:var(--ink-faint);line-height:1.7;max-width:440px;background:var(--surface-2);border-radius:12px;padding:11px 14px}
  .credit{font-size:11px;color:var(--ink-faint)}

  .viewer{position:fixed;inset:0;z-index:50;background:rgba(14,20,16,.93);backdrop-filter:blur(4px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s}
  .viewer.open{opacity:1;pointer-events:auto}
  .vhead{display:flex;align-items:center;gap:12px;padding:14px 16px;color:#fff;flex:none}
  .vhead .vt{flex:1;min-width:0}
  .vhead .vt .vtitle{font-size:16px;font-weight:800;line-height:1.2;font-family:var(--font-round)}
  .vhead .vt .vtag{font-size:12px;color:#FF9B7E;font-weight:700}
  .vclose{flex:none;width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.15);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
  .vclose:hover{background:rgba(255,255,255,.28)}
  .vstage{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;padding:0 10px;overflow:hidden;touch-action:pan-y pinch-zoom}
  .vstage img{max-width:100%;max-height:100%;object-fit:contain;border-radius:14px;box-shadow:0 20px 50px -20px rgba(0,0,0,.7);user-select:none;-webkit-user-drag:none}
  .vbtn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:rgba(255,255,255,.16);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .16s}
  .vbtn:hover{background:rgba(255,255,255,.3)}
  .vbtn.prev{left:14px}.vbtn.next{right:14px}
  .vbtn:disabled{opacity:.25;cursor:default}
  @media(max-width:560px){.vbtn{width:38px;height:38px;font-size:19px}.vbtn.prev{left:6px}.vbtn.next{right:6px}}
  .vfoot{flex:none;padding:14px 16px 22px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .dots{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:320px}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all .16s}
  .dot.on{background:var(--accent);transform:scale(1.25)}
  .vcount{color:rgba(255,255,255,.9);font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.03em}
  .vhint{color:rgba(255,255,255,.55);font-size:11px;font-weight:600}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <img class="logo" src="images/mascot.jpg" alt="ひらめ" width="60" height="60" />
        <div>
          <h1>ひらめの疾患<b>図鑑</b></h1>
          <div class="sub">たとえ話と図解で、病気がスッとわかる</div>
        </div>
      </div>
      <div class="tagbio">看護師の「難しい…」を「なるほど！」へ ／ 疾患・検査・薬をたとえ話でやさしく図解 🐡</div>
      <div class="search">
        <span class="ico">🔍</span>
        <input id="q" type="search" placeholder="テーマで探す（例：心不全、弁、ペースメーカー）" autocomplete="off" aria-label="テーマで検索" />
      </div>
      <div class="chips" id="chips"></div>
    </header>

    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>

    <footer>
      <a class="threads" href="https://www.threads.net/@hirame_2start" target="_blank" rel="noopener">＠ Threadsで最新の図解を見る</a>
      <a class="backlp" href="../">← ヒラメのトップページへ</a>
      <div class="disc">この図鑑は「やさしく学ぶ」ための解説です。診断・治療の判断は、必ず主治医や各施設の基準に従ってください。</div>
      <div class="credit">© ひらめ ／ ヒラメ @50代から始める第2ステージ</div>
    </footer>
  </div>

  <div class="viewer" id="viewer" aria-hidden="true">
    <div class="vhead">
      <div class="vt">
        <div class="vtitle" id="v-title"></div>
        <div class="vtag" id="v-tag"></div>
      </div>
      <button class="vclose" id="v-close" aria-label="閉じる">✕</button>
    </div>
    <div class="vstage" id="v-stage">
      <button class="vbtn prev" id="v-prev" aria-label="前へ">‹</button>
      <img id="v-img" alt="" />
      <button class="vbtn next" id="v-next" aria-label="次へ">›</button>
    </div>
    <div class="vfoot">
      <div class="vcount" id="v-count">1 / 1</div>
      <div class="dots" id="v-dots"></div>
      <div class="vhint">← → キーやスワイプでめくれます</div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  const IMGDIR = "images/";
  const src = key => IMGDIR + key + ".jpg";

  function slides(prefix, n){ const a=[]; for(let i=1;i<=n;i++) a.push(prefix+"-"+i); return a; }

  const TOPICS = [
    { id:"hf1", title:"心不全",             tagline:"ポンプが弱ったポット", cat:"心臓・ポンプ",   slides:slides("hf1",7) },
    { id:"hf2", title:"心不全（第2弾）",     tagline:"ポンプが弱ったポット", cat:"心臓・ポンプ",   slides:slides("hf2",7) },
    { id:"pe",  title:"肺動脈血栓症",         tagline:"高速道路の大渋滞",     cat:"血管",           slides:slides("pe",9) },
    { id:"mr",  title:"僧帽弁閉鎖不全症",     tagline:"壊れた逆流防止ドア",   cat:"心臓の弁",       slides:slides("mr",9) },
    { id:"ar",  title:"大動脈弁閉鎖不全症",   tagline:"逆流する蛇口",         cat:"心臓の弁",       slides:slides("ar",8) },
    { id:"avs", title:"大動脈弁狭窄症",       tagline:"開かない自動ドア",     cat:"心臓の弁",       slides:slides("avs",5) },
    { id:"aa",  title:"大動脈瘤（胸部・腹部）",tagline:"ふくらんだ高速道路",   cat:"血管",           slides:slides("aa",9) },
    { id:"pm",  title:"ペースメーカー",       tagline:"心臓のリズム係",       cat:"医療機器",       slides:slides("pm",7) },
    { id:"rs",  title:"リアリティショック",   tagline:"初めての海",           cat:"ナースの気持ち", slides:slides("rs",5) },
  ];

  const $ = id => document.getElementById(id);
  let activeCat = "すべて", query = "";

  const cats = ["すべて", ...Array.from(new Set(TOPICS.map(t=>t.cat)))];
  const chipBox = $("chips");
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"+(c==="すべて"?" on":""); b.textContent=c;
    b.addEventListener("click",()=>{ activeCat=c; chipBox.querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x.textContent===c)); render(); });
    chipBox.appendChild(b);
  });

  $("q").addEventListener("input", e=>{ query=e.target.value.trim().toLowerCase(); render(); });

  function match(t){
    if(activeCat!=="すべて" && t.cat!==activeCat) return false;
    if(!query) return true;
    return (t.title+t.tagline+t.cat).toLowerCase().includes(query);
  }

  function render(){
    const list = TOPICS.filter(match);
    const totalSlides = TOPICS.reduce((s,t)=>s+t.slides.length,0);
    $("count").textContent = query||activeCat!=="すべて"
      ? `${list.length} テーマ`
      : `全 ${TOPICS.length} テーマ・${totalSlides} 枚の図解`;
    const grid=$("grid"); grid.innerHTML="";
    list.forEach(t=>{
      const c=document.createElement("button");
      c.className="card";
      c.innerHTML =
        `<div class="thumb"><img loading="lazy" src="${src(t.slides[0])}" alt="${t.title}" width="400" height="400"><span class="badge">🖼 ${t.slides.length}枚</span></div>
         <div class="cbody">
           <span class="cat">${t.cat}</span>
           <div class="title">${t.title}</div>
           <div class="tagline">${t.tagline}</div>
         </div>`;
      c.addEventListener("click",()=>openViewer(t));
      grid.appendChild(c);
    });
  }

  const viewer=$("viewer");
  let cur=null, idx=0;
  function openViewer(t){ cur=t; idx=0; $("v-title").textContent=t.title; $("v-tag").textContent="“"+t.tagline+"”"; buildDots(); show(); viewer.classList.add("open"); viewer.setAttribute("aria-hidden","false"); document.body.style.overflow="hidden"; }
  function closeViewer(){ viewer.classList.remove("open"); viewer.setAttribute("aria-hidden","true"); document.body.style.overflow=""; }
  function buildDots(){ const d=$("v-dots"); d.innerHTML=""; cur.slides.forEach((s,i)=>{ const o=document.createElement("span"); o.className="dot"+(i===0?" on":""); o.addEventListener("click",()=>{idx=i;show();}); d.appendChild(o); }); }
  function show(){
    $("v-img").src=src(cur.slides[idx]);
    $("v-img").alt=cur.title+" "+(idx+1);
    $("v-count").textContent=`${idx+1} / ${cur.slides.length}`;
    $("v-prev").disabled=idx===0; $("v-next").disabled=idx===cur.slides.length-1;
    $("v-dots").querySelectorAll(".dot").forEach((o,i)=>o.classList.toggle("on",i===idx));
  }
  function next(){ if(idx<cur.slides.length-1){idx++;show();} }
  function prev(){ if(idx>0){idx--;show();} }
  $("v-next").addEventListener("click",next);
  $("v-prev").addEventListener("click",prev);
  $("v-close").addEventListener("click",closeViewer);
  viewer.addEventListener("click",e=>{ if(e.target===viewer||e.target.id==="v-stage") closeViewer(); });
  document.addEventListener("keydown",e=>{ if(!viewer.classList.contains("open"))return; if(e.key==="Escape")closeViewer(); if(e.key==="ArrowRight")next(); if(e.key==="ArrowLeft")prev(); });
  let sx=0,sy=0,sw=false;
  const stage=$("v-stage");
  stage.addEventListener("touchstart",e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; sw=true; },{passive:true});
  stage.addEventListener("touchend",e=>{ if(!sw)return; sw=false; const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy; if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)){ if(dx<0)next(); else prev(); } });

  render();
})();
</script>
</body>
</html>
